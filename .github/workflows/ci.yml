name: CI Quality Checks
on:
  pull_request:
    branches: ["release"]
    paths:
      - "backend/**"
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  code-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14" 
          cache: 'pip'
          cache-dependency-path: "./backend/pyproject.toml"
      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install ".[dev]"
      - name: Check Formatting (Ruff Format)
        id: format
        run: make format
        continue-on-error: true
      - name: Check Spelling (Codespell)
        id: spell
        run: make spell
        continue-on-error: true
      - name: Run Linter (Ruff)
        id: lint
        run: make lint
        continue-on-error: true
      - name: Type Check (mypy)
        id: typecheck
        run: make typecheck
        continue-on-error: true
      - name: Final Status Check
        if: always()
        run: |
          failed=false
          [[ "${{ steps.format.outcome }}" != "success" ]] && echo "::error::Formatting check failed" && failed=true
          [[ "${{ steps.spell.outcome }}" != "success" ]] && echo "::error::Spelling check failed" && failed=true
          [[ "${{ steps.lint.outcome }}" != "success" ]] && echo "::error::Linting check failed" && failed=true
          [[ "${{ steps.typecheck.outcome }}" != "success" ]] && echo "::error::Typecheck check failed" && failed=true
          if [[ "$failed" == "true" ]]; then
            exit 1
          fi
