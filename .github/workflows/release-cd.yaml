name: release-after-merge
on:
  push:
    branches:
      - release
permissions:
  contents: write
  packages: write
jobs:
  create-tag:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.tagger.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate Tag
        id: tagger
        run: |
          VERSION=$(node -p "require('./frontend/package.json').version")
          echo "release_tag=$VERSION" >> $GITHUB_OUTPUT
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          DATE=$(date +'%Y%m%d')
          TAG="hail-mary-com2020-v${VERSION}-${DATE}"
          git tag "$TAG"
          git push origin $TAG
  build-push:
    needs: create-tag
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: hail-mary-com2020-frontend
            context: .
            file: ./deployment/frontend.dockerfile
          - service: hail-mary-com2020-backend
            context: .
            file: ./deployment/backend.dockerfile
    steps:
      - uses: actions/checkout@v4
      - name: setup docker buildx
        uses: docker/setup-buildx-action@v3

      - name: login to github
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ needs.create-tag.outputs.release_tag }}
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:latest
