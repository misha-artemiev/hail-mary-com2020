name: dev-backend-docs-after-merge
on:
  push:
    branches:
      - dev/backend
permissions:
  contents: write
jobs:
  deploy-docs:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'
      - name: install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"
      - name: Build documentation
        run: make docs
      - name: deploy to github pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: backend/docs
          branch: gh/backend-docs
          clean: true
