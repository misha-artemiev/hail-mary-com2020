name: pull request checks
on:
  pull_request:
    branches:
      - 'dev/*'
jobs:
  backend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - name: setup python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'
          cache: 'pip'
      - name: install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"
      - name: run checks
        run: make check
      - name: try regen docs
        run: make docs
      - name: check docs
        run: |
          if [ -n "$(git status --porcelain docs)" ]; then
            git diff docs
            exit 1
          else
            exit 0
          fi
  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - name: setup nodejs
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: install dependencies
        run: npm ci
      - name: run checks
        run: |
          npm run lint
          npm run format
